<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Graph Skills - Module 7</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1200px; margin: 20px auto; padding: 20px; background-color: #f4f7f6; color: #333; }
        .module-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .app-layout { display: grid; grid-template-columns: 620px auto; gap: 30px; margin-top: 15px; }
        .graph-wrapper { position: relative; width: 620px; height: 620px; background: #fff; border: 1px solid #ccc; cursor: crosshair;}
        canvas { display: block; position: absolute; top: 0; left: 0; } #bgCanvas { z-index: 1; } #drawCanvas { z-index: 2; }
        .info-panel { background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
        .scenario-box { padding: 15px; background: #eef2f5; border-radius: 6px; border-left: 4px solid #0056b3; margin-bottom: 20px; font-size: 1.05em; line-height: 1.4;}
        .step-box { padding: 15px; background: #fff; border-radius: 6px; border: 1px solid #ccc; margin-bottom: 15px;}
        .tool-btn { padding: 10px; border: 1px solid #ccc; background: #fff; cursor: pointer; border-radius: 4px; font-weight: bold;}
        .tool-btn.active { background: #0056b3; color: white; border-color: #0056b3; }
        input[type="number"] { padding: 8px; font-size: 1.1em; width: 100px; border: 1px solid #ccc; border-radius: 4px;}
        .btn-main { display: block; padding: 12px; font-size: 1.1em; cursor: pointer; border: none; border-radius: 4px; background-color: #0056b3; color: white; width: 100%; margin-top: 10px; font-weight: bold;}
        .btn-main:hover { background-color: #004494; } .btn-main:disabled { opacity: 0.6; cursor: not-allowed; }
        .split-fb { padding: 12px; border-radius: 4px; font-size: 0.95em; line-height: 1.4; border-left: 5px solid; background: #fff; margin-top: 10px;}
        .pass-box { border-color: #28a745; color: #155724; } .err-box { border-color: #d9534f; color: #721c24; } .meh-box { border-color: #ffc107; color: #856404; }
        table { border-collapse: collapse; width: 100%; font-size: 0.85em; text-align: center; margin-top: 20px;} th, td { border: 1px solid #aaa; padding: 5px; } th { background: #e9ecef; }
    </style>
</head>
<body>
<div class="module-container">
    <h2 style="margin-top:0;">Module 7: Interpolation & Extrapolation</h2>
    <div class="app-layout">
        <div class="graph-wrapper"><canvas id="bgCanvas" width="620" height="620"></canvas><canvas id="drawCanvas" width="620" height="620"></canvas></div>
        <div class="info-panel">
            <div class="scenario-box" id="scenario-text">Loading...</div>
            <div class="step-box">
                <strong>Step 1: Draw the Model</strong><br><small>Choose tool and draw best fit.</small>
                <div style="display:flex; gap:5px; margin-top:10px;"><button id="tool-line" class="tool-btn active" onclick="setTool('line')">Line</button><button id="tool-curve" class="tool-btn" onclick="setTool('curve')">Curve</button><button class="tool-btn" onclick="clearDrawing()">Clear</button></div>
            </div>
            <div class="step-box">
                <strong>Step 2: Read Value</strong><br>
                <div id="prompt-text" style="margin: 10px 0; font-weight:bold; color:#d9534f;">Use your model to predict...</div>
                <input type="number" id="pred-val" step="any"> <span id="pred-unit"></span>
            </div>
            <button class="btn-main" id="eval-btn" onclick="evaluatePrediction()">Evaluate Prediction</button>
            <button class="btn-main" id="next-btn" style="background:#28a745; display:none;" onclick="init()">Next Practice Scenario</button>
            <div id="feedback"></div>
        </div>
    </div>
</div>

<script>
    const scenarioBank = [
        { id: 701, t: "Hooke's Law", xL: "Force (N)", yL: "Extension (cm)", m: "linear", minX: 0, maxX: 10, minY: 0, maxY: 25 },
        { id: 702, t: "Cooling Curve", xL: "Time (min)", yL: "Temp (°C)", m: "curve", minX: 0, maxX: 30, minY: 20, maxY: 90 },
        { id: 703, t: "Ohm's Law", xL: "Voltage (V)", yL: "Current (A)", m: "linear", minX: 0, maxX: 12, minY: 0, maxY: 2.4 }
    ];

    const bgCanvas = document.getElementById('bgCanvas'), ctxBg = bgCanvas.getContext('2d'), drawCanvas = document.getElementById('drawCanvas'), ctxDraw = drawCanvas.getContext('2d'), pad = 60, size = 500;
    let points = [], isDrawing = false, currentTool = 'line', drawingNodes = [], activeScen = null, targetX = 0, exactY = 0, isExtrap = false;
    
    const MODULE_ID = "7"; let stats = { model: { linear: { line: 0, curve: 0 }, curve: { line: 0, curve: 0 } }, pred: { inter: { exa: 0, clo: 0, wrg: 0 }, extra: { exa: 0, clo: 0, wrg: 0 } } }; let totalPasses = 0, totalAttempts = 0;
    try { let mem = JSON.parse(localStorage.getItem(`gs_mod_${MODULE_ID}`)); if (mem && mem.details) { totalPasses = mem.correct || 0; totalAttempts = mem.total || 0; stats = mem.details; } } catch(e) {}

    function init() {
        points = []; drawingNodes = []; document.getElementById('pred-val').value = ""; document.getElementById('feedback').innerHTML = ""; document.getElementById('next-btn').style.display = "none"; document.getElementById('eval-btn').style.display = "block";
        activeScen = scenarioBank[Math.floor(Math.random() * scenarioBank.length)]; document.getElementById('scenario-text').innerHTML = `<strong>${activeScen.t}</strong><br>Draw the trend, then predict the missing value.`; document.getElementById('pred-unit').innerText = activeScen.yL;
        
        let spanX = activeScen.maxX - activeScen.minX, spanY = activeScen.maxY - activeScen.minY;
        for (let i=1; i<=6; i++) {
            let px = activeScen.minX + (i/7)*spanX; let py;
            if(activeScen.m === 'linear') py = activeScen.minY + (i/7)*spanY + (Math.random()*0.1*spanY - 0.05*spanY);
            else py = activeScen.minY + spanY * Math.exp(-1.5 * (i/7)) + (Math.random()*0.1*spanY - 0.05*spanY);
            points.push({ x: pad + ((px - activeScen.minX)/spanX)*size, y: pad + size - ((py - activeScen.minY)/spanY)*size });
        }
        
        isExtrap = Math.random() > 0.5;
        targetX = isExtrap ? activeScen.maxX - (0.05 * spanX) : activeScen.minX + (0.4 * spanX);
        document.getElementById('prompt-text').innerText = `What is the Y-value when X = ${targetX.toFixed(1)}?`;
        
        setTool('line'); drawGrid();
    }

    function drawGrid() {
        ctxBg.clearRect(0,0,620,620); ctxBg.strokeStyle = "#eee"; ctxBg.lineWidth = 1;
        for(let i=0; i<=10; i++) { let p = pad + (i*(size/10)); ctxBg.beginPath(); ctxBg.moveTo(p, pad); ctxBg.lineTo(p, pad+size); ctxBg.stroke(); ctxBg.beginPath(); ctxBg.moveTo(pad, p); ctxBg.lineTo(pad+size, p); ctxBg.stroke(); }
        ctxBg.lineWidth = 2; ctxBg.strokeStyle = "#000"; ctxBg.strokeRect(pad, pad, size, size);
        ctxBg.fillStyle = "#000"; ctxBg.font = "bold 14px Arial"; ctxBg.textAlign = "center"; ctxBg.fillText(activeScen.xL, pad+(size/2), pad+size+40); ctxBg.save(); ctxBg.translate(20, pad+(size/2)); ctxBg.rotate(-Math.PI/2); ctxBg.fillText(activeScen.yL, 0, 0); ctxBg.restore();
        points.forEach(p => { ctxBg.strokeStyle = "#c0392b"; ctxBg.lineWidth = 2; ctxBg.beginPath(); ctxBg.moveTo(p.x-5, p.y-5); ctxBg.lineTo(p.x+5, p.y+5); ctxBg.moveTo(p.x+5, p.y-5); ctxBg.lineTo(p.x-5, p.y+5); ctxBg.stroke(); });
    }

    function setTool(t) { currentTool = t; drawingNodes = []; ctxDraw.clearRect(0,0,620,620); document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active')); document.getElementById('tool-'+t).classList.add('active'); }
    function clearDrawing() { drawingNodes = []; ctxDraw.clearRect(0,0,620,620); }

    drawCanvas.addEventListener('mousedown', e => { let r = drawCanvas.getBoundingClientRect(), mx = e.clientX - r.left, my = e.clientY - r.top; if (currentTool === 'line') { isDrawing = true; drawingNodes = [{x: mx, y: my}]; } else { drawingNodes.push({x: mx, y: my}); renderDrawing(); } });
    drawCanvas.addEventListener('mousemove', e => { if (isDrawing && currentTool === 'line') { drawingNodes[1] = {x: e.clientX - drawCanvas.getBoundingClientRect().left, y: e.clientY - drawCanvas.getBoundingClientRect().top}; renderDrawing(); } });
    drawCanvas.addEventListener('mouseup', () => isDrawing = false); drawCanvas.addEventListener('dblclick', () => { if (currentTool === 'curve') renderDrawing(true); });

    function renderDrawing(closed = false) {
        ctxDraw.clearRect(0,0,620,620); if (drawingNodes.length < 2) return;
        ctxDraw.strokeStyle = "#0056b3"; ctxDraw.lineWidth = 3; ctxDraw.lineJoin = "round"; ctxDraw.beginPath(); ctxDraw.moveTo(drawingNodes[0].x, drawingNodes[0].y);
        if (currentTool === 'line') { ctxDraw.lineTo(drawingNodes[1].x, drawingNodes[1].y); } else { for (let i = 0; i < drawingNodes.length - 1; i++) { let p0 = (i > 0) ? drawingNodes[i - 1] : drawingNodes[0], p1 = drawingNodes[i], p2 = drawingNodes[i + 1], p3 = (i != drawingNodes.length - 2) ? drawingNodes[i + 2] : p2; ctxDraw.bezierCurveTo(p1.x + (p2.x - p0.x)/6, p1.y + (p2.y - p0.y)/6, p2.x - (p3.x - p1.x)/6, p2.y - (p3.y - p1.y)/6, p2.x, p2.y); } }
        ctxDraw.stroke();
    }

    function evaluatePrediction() {
        if(drawingNodes.length < 2) return alert("Please draw your line/curve first.");
        let uVal = parseFloat(document.getElementById('pred-val').value); if(isNaN(uVal)) return alert("Please enter a numerical prediction.");
        
        let pxTarget = pad + ((targetX - activeScen.minX)/(activeScen.maxX - activeScen.minX))*size; let pyTarget = null;
        if(currentTool === 'line') { let m = (drawingNodes[1].y - drawingNodes[0].y)/(drawingNodes[1].x - drawingNodes[0].x), c = drawingNodes[0].y - m*drawingNodes[0].x; pyTarget = m*pxTarget + c; } 
        else {
            let closest = null, minDx = Infinity;
            for(let t=0; t<=1; t+=0.01) {
                for(let i=0; i<drawingNodes.length-1; i++) {
                    let p0=(i>0)?drawingNodes[i-1]:drawingNodes[0], p1=drawingNodes[i], p2=drawingNodes[i+1], p3=(i<drawingNodes.length-2)?drawingNodes[i+2]:p2;
                    let tx = 0.5 * ((2 * p1.x) + (-p0.x + p2.x) * t + (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * t * t + (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * t * t * t);
                    let ty = 0.5 * ((2 * p1.y) + (-p0.y + p2.y) * t + (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * t * t + (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * t * t * t);
                    if(Math.abs(tx - pxTarget) < minDx) { minDx = Math.abs(tx - pxTarget); pyTarget = ty; }
                }
            }
        }
        
        let exactDataY = activeScen.minY + ((pad + size - pyTarget)/size) * (activeScen.maxY - activeScen.minY);
        let err = Math.abs(uVal - exactDataY); let span = activeScen.maxY - activeScen.minY; let tolScale = span/50;
        
        let mPass = (currentTool === activeScen.m), rPass = (err <= tolScale*1.5);
        stats.model[activeScen.m][currentTool]++;
        let typeStr = isExtrap ? 'extra' : 'inter';
        if (err <= tolScale) stats.pred[typeStr].exa++; else if (err <= tolScale*1.5) stats.pred[typeStr].clo++; else stats.pred[typeStr].wrg++;

        let fH = ""; let errLog = [];
        if(mPass) fH += `<div class="split-fb pass-box">✅ Model: You chose the correct shape.</div>`; 
        else { fH += `<div class="split-fb err-box">❌ Model: Wrong shape. Should be ${activeScen.m}.</div>`; errLog.push("Wrong Model"); }

        if (err <= tolScale) fH += `<div class="split-fb pass-box">✅ Read: Spot on! The line says ${exactDataY.toFixed(1)}.</div>`;
        else if (err <= tolScale*1.5) fH += `<div class="split-fb meh-box">⚠️ Read: Close enough. Line says ${exactDataY.toFixed(1)}.</div>`;
        else { fH += `<div class="split-fb err-box">❌ Read: Way off. According to YOUR line, Y should be ${exactDataY.toFixed(1)}.</div>`; errLog.push("Misread grid"); }

        // Draw intercept
        ctxDraw.strokeStyle = "#e67e22"; ctxDraw.setLineDash([5,5]); ctxDraw.beginPath(); ctxDraw.moveTo(pxTarget, pad+size); ctxDraw.lineTo(pxTarget, pyTarget); ctxDraw.lineTo(pad, pyTarget); ctxDraw.stroke(); ctxDraw.setLineDash([]);
        
        document.getElementById('feedback').innerHTML = fH; document.getElementById('eval-btn').style.display = "none"; document.getElementById('next-btn').style.display = "block";
        totalAttempts++; if(mPass && rPass) totalPasses++;
        
        // --- TRACKING CODE ---
        let statusText = (mPass && rPass) ? "Pass" : "Fail";
        let errorString = errLog.length > 0 ? errLog.join(" | ") : "None";
        if (window.parent && window.parent.logToTeacher) { window.parent.logToTeacher("Module 7", activeScen.id, activeScen.t, statusText, errorString); }
        // ---------------------

        localStorage.setItem(`gs_mod_${MODULE_ID}`, JSON.stringify({ correct: totalPasses, total: totalAttempts, details: stats }));
    }
    
    init();
</script>
</body>
</html>
