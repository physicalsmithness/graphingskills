<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Skills - Module 5</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1200px; margin: 20px auto; padding: 20px; background-color: #f4f7f6; color: #333; }
        .module-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 15px;}
        .level-selector { font-size: 1.1em; padding: 8px; border-radius: 4px; border: 1px solid #0056b3; font-weight: bold; background: #eef2f5;}
        .app-layout { display: grid; grid-template-columns: auto 400px; gap: 30px; margin-top: 10px; }
        .graph-wrapper { position: relative; width: 620px; height: 620px; background: #fff; border: 1px solid #ccc; border-radius: 4px; cursor: crosshair;}
        canvas { display: block; position: absolute; top: 0; left: 0; }
        #bgCanvas { z-index: 1; } 
        #plotCanvas { z-index: 2; } 
        .info-panel { background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #ddd; align-self: start; }
        .question-box { font-size: 1.1em; line-height: 1.4; margin-bottom: 15px; min-height: 50px;}
        .data-table { border-collapse: collapse; width: 100%; margin-bottom: 15px; background: #fff; font-size: 0.9em;}
        .data-table th, .data-table td { border: 1px solid #ccc; padding: 6px; text-align: center; }
        .data-table th { background-color: #e9ecef; }
        .row-header { text-align: left !important; font-weight: bold; background-color: #dee2e6; width: 35%;}
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .controls button { flex: 1; padding: 8px 10px; font-size: 0.9em; cursor: pointer; border: none; border-radius: 4px; background-color: #6c757d; color: white; }
        .btn-main { display: block; padding: 12px 20px; font-size: 1.1em; cursor: pointer; border: none; border-radius: 4px; background-color: #0056b3; color: white; width: 100%; margin-bottom: 10px;}
        .btn-success { background-color: #28a745; }
        .feedback-container { margin-top: 15px; max-height: 200px; overflow-y: auto;}
        .fb-box { margin-bottom: 8px; padding: 8px 12px; border-radius: 4px; background: #fff; border: 1px solid #eee; font-size: 0.9em; border-left: 4px solid #ccc;}
        .score-grid { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85em; }
        .score-grid th, .score-grid td { border: 1px solid #aaa; padding: 4px; text-align: center; }
        .score-grid th { background: #eee; }

        /* Footer Styles */
        .footer { text-align: center; margin-top: 30px; border-top: 1px solid #eee; padding-top: 15px; font-size: 0.9em; }
        .footer a { color: #6c757d; text-decoration: none; }
        .footer a:hover { color: #333; text-decoration: underline; }
    </style>
</head>
<body>

<div class="module-container">
    <div class="header-controls">
        <div>
            <h2 style="margin: 0;">Module 5: Precision Plotting</h2>
            <p style="margin: 5px 0 0 0;">Snap to half-squares. Accuracy is everything.</p>
        </div>
        <select id="level-select" class="level-selector" onchange="loadNewQuestion()">
            <option value="1">Level 1</option>
            <option value="2">Level 2</option>
            <option value="3">Level 3</option>
            <option value="4">Level 4</option>
        </select>
    </div>
    
    <div class="app-layout">
        <div class="graph-wrapper" id="graph-wrapper">
            <canvas id="bgCanvas" width="620" height="620"></canvas>
            <canvas id="plotCanvas" width="620" height="620"></canvas>
        </div>

        <div class="info-panel">
            <div class="question-box" id="question-text">Initializing...</div>
            <div id="table-container"></div>
            
            <div class="controls">
                <button onclick="undoLastPoint()">Undo</button>
                <button onclick="clearAllPoints()">Clear All</button>
            </div>

            <button class="btn-main" id="submit-btn" onclick="evaluatePlot()">Evaluate My Plot</button>
            <button class="btn-main btn-success" id="next-btn" style="display:none;" onclick="loadNewQuestion()">Next Question</button>

            <div class="feedback-container" id="feedback-text"></div>

            <div class="dashboard">
                <h3 style="margin-top:0; font-size:1em;">Performance Matrix</h3>
                <table class="score-grid">
                    <thead><tr><th>Level</th><th>Perf.</th><th>½ Off</th><th>1+ Off</th></tr></thead>
                    <tbody id="score-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="footer">
        <a href="feedback.html" target="_blank">🐛 Report an Issue / Leave Feedback</a>
    </div>
</div>

<script>
    let activeQuestion = null, userPoints = [], isEvaluating = false, inBounds = false;
    let snapX, snapY, hoverColIndex, boxSizeX, boxSizeY;
    const bgCanvas = document.getElementById('bgCanvas'), ctxBg = bgCanvas.getContext('2d');
    const plotCanvas = document.getElementById('plotCanvas'), ctxPlot = plotCanvas.getContext('2d');
    const padL = 85, padB = 85, padT = 40, padR = 40;

    let mastery = { 1: {p:0, h:0, b:0}, 2: {p:0, h:0, b:0}, 3: {p:0, h:0, b:0}, 4: {p:0, h:0, b:0} };
    const configPool = {
        1: { xScales: [1, 2, 5, 10], yScales: [1, 2, 5, 10], barProb: 0.4, msg: "Standard scale plotting." },
        2: { xScales: [0.1, 0.2, 0.5], yScales: [0.1, 0.2, 0.5], barProb: 0.3, msg: "Decimal scale precision." },
        3: { xScales: [4, 8, 20, 25], yScales: [4, 8, 20, 25], barProb: 0, msg: "Calculating awkward minor divisions." },
        4: { xScales: [1, 10], yScales: [1, 5, 10], barProb: 0, msg: "Unit conversion challenge (mm to 10⁻² m)." }
    };

    function generateData() {
        const lvl = document.getElementById('level-select').value;
        const cfg = configPool[lvl];
        const isBar = Math.random() < cfg.barProb;
        
        let q = { 
            level: lvl, type: isBar ? "categorical" : "continuous", dataX: [], dataY: [], scenario: cfg.msg,
            x: { label: "Time (s)", start: 0, scale: cfg.xScales[Math.floor(Math.random()*cfg.xScales.length)], boxes: 6, minors: 10, mult: 1 },
            y: { label: "Temp (°C)", start: 0, scale: cfg.yScales[Math.floor(Math.random()*cfg.yScales.length)], boxes: 6, minors: 10, mult: 1 }
        };

        if (lvl == 4) { 
            q.x.label = "Length (x 10⁻² m)"; 
            q.x.mult = 10; 
            q.x.scale = 10;
            q.y.label = "Force (N)"; 
        }
        
        if (isBar) { q.x.label = "Sample"; q.x.cats = ["A", "B", "C", "D", "E"]; }

        for (let i = 0; i < 5; i++) {
            let maxY = q.y.scale * 6;
            let yVal = Math.random() * maxY;
            q.dataY.push(parseFloat((Math.round(yVal / (q.y.scale/20)) * (q.y.scale/20)).toFixed(3)));
            
            if (isBar) q.dataX.push(q.x.cats[i]);
            else {
                let maxX = q.x.scale * 6;
                let xVal = Math.random() * maxX;
                let sx = Math.round(xVal / (q.x.scale/20)) * (q.x.scale/20);
                q.dataX.push(lvl == 4 ? parseFloat((sx * 10).toFixed(1)) : parseFloat(sx.toFixed(3)));
            }
        }
        return q;
    }

    function drawBackground(q) {
        ctxBg.clearRect(0, 0, 620, 620);
        let w = 620 - padL - padR, h = 620 - padB - padT;
        boxSizeX = w / 6; boxSizeY = h / 6;
        let oX = padL, oY = 620 - padB;

        ctxBg.lineWidth = 1;
        for (let i = 0; i <= 60; i++) {
            let x = oX + (i * (w/60)); ctxBg.strokeStyle = (i % 10 === 0) ? "#999" : "#eee";
            ctxBg.beginPath(); ctxBg.moveTo(x, oY); ctxBg.lineTo(x, oY - h); ctxBg.stroke();
            let y = oY - (i * (h/60)); ctxBg.strokeStyle = (i % 10 === 0) ? "#999" : "#eee";
            ctxBg.beginPath(); ctxBg.moveTo(oX, y); ctxBg.lineTo(oX + w, y); ctxBg.stroke();
        }
        
        ctxBg.lineWidth = 2; ctxBg.strokeStyle = "#000"; ctxBg.strokeRect(oX, oY - h, w, h);
        ctxBg.fillStyle = "#333"; ctxBg.font = "12px Arial"; ctxBg.textAlign = "center";
        
        for (let i = 0; i <= 6; i++) {
            if (q.type == "continuous") ctxBg.fillText(Number((q.x.start + i*q.x.scale).toFixed(3)), oX + i*boxSizeX, oY + 15);
            else if (i < 5) ctxBg.fillText(q.x.cats[i], oX + i*boxSizeX + boxSizeX/2, oY + 15);
            ctxBg.textAlign = "right";
            ctxBg.fillText(Number((q.y.start + i*q.y.scale).toFixed(3)), oX - 10, oY - i*boxSizeY + 5);
            ctxBg.textAlign = "center";
        }
        ctxBg.fillStyle = "#000"; ctxBg.font = "bold 14px Arial";
        ctxBg.fillText(q.x.label, oX + w/2, 620 - 10);
        ctxBg.save(); ctxBg.translate(20, oY - h/2); ctxBg.rotate(-Math.PI/2); ctxBg.fillText(q.y.label, 0, 0); ctxBg.restore();
    }

    function renderPlot() {
        ctxPlot.clearRect(0, 0, 620, 620);
        if (!activeQuestion) return;
        let oX = padL, oY = 620 - padB, w = 6 * boxSizeX, h = 6 * boxSizeY;
        
        if (isEvaluating) {
            ctxPlot.strokeStyle = "rgba(40, 167, 69, 0.7)"; ctxPlot.lineWidth = 2;
            activeQuestion.dataX.forEach((dx, i) => {
                let graphX = activeQuestion.level == 4 ? dx / 10 : dx;
                let tx = activeQuestion.type == "continuous" ? oX + ((graphX - activeQuestion.x.start)/(activeQuestion.x.scale * 6)) * w : oX + i*boxSizeX + boxSizeX/2;
                let ty = oY - ((activeQuestion.dataY[i] - activeQuestion.y.start)/(activeQuestion.y.scale * 6)) * h;
                ctxPlot.beginPath(); ctxPlot.arc(tx, ty, 8, 0, 7); ctxPlot.stroke();
            });
        }
        if (!isEvaluating && inBounds) {
            ctxPlot.strokeStyle = "rgba(0, 86, 179, 0.3)"; ctxPlot.setLineDash([4,4]); ctxPlot.beginPath(); 
            let cx = activeQuestion.type == "continuous" ? snapX : oX + hoverColIndex*boxSizeX + boxSizeX/2;
            ctxPlot.moveTo(cx, oY); ctxPlot.lineTo(cx, oY - h); ctxPlot.moveTo(oX, snapY); ctxPlot.lineTo(oX + w, snapY); ctxPlot.stroke(); ctxPlot.setLineDash([]);
        }
        userPoints.forEach(p => {
            if (activeQuestion.type == "continuous") {
                ctxPlot.strokeStyle = "#c0392b"; ctxPlot.lineWidth = 2;
                ctxPlot.beginPath(); ctxPlot.moveTo(p.x-5, p.y-5); ctxPlot.lineTo(p.x+5, p.y+5); ctxPlot.moveTo(p.x+5, p.y-5); ctxPlot.lineTo(p.x-5, p.y+5); ctxPlot.stroke();
            } else { ctxPlot.fillStyle = "rgba(0, 86, 179, 0.6)"; ctxPlot.fillRect(oX + p.col*boxSizeX + boxSizeX*0.2, p.y, boxSizeX*0.6, oY - p.y); }
        });
    }

    function evaluatePlot() {
        if (userPoints.length < 5) return alert("Plot all 5 points first!");
        isEvaluating = true;
        let oX = padL, oY = 620 - padB, w = 6 * boxSizeX, h = 6 * boxSizeY, feedback = "", lvl = activeQuestion.level;
        
        let targets = activeQuestion.dataX.map((dx, i) => {
            let graphX = activeQuestion.level == 4 ? dx / 10 : dx;
            return {
                tx: activeQuestion.type == "continuous" ? oX + ((graphX - activeQuestion.x.start)/(activeQuestion.x.scale * 6)) * w : oX + i*boxSizeX + boxSizeX/2,
                ty: oY - ((activeQuestion.dataY[i] - activeQuestion.y.start)/(activeQuestion.y.scale * 6)) * h,
                used: false, col: i
            };
        });

        let currentB = 0; // Track inaccurate points in this specific submission

        userPoints.forEach((p) => {
            let closest = null, minDist = Infinity;
            targets.forEach(t => {
                if (activeQuestion.type == "categorical") {
                    if (p.col === t.col) { closest = t; }
                } else if (!t.used) {
                    let d = Math.sqrt(Math.pow(p.x - t.tx, 2) + Math.pow(p.y - t.ty, 2));
                    if (d < minDist) { minDist = d; closest = t; }
                }
            });

            if (closest) {
                closest.used = true;
                let err = Math.max(Math.abs(closest.tx - p.x || 0) / (boxSizeX/10), Math.abs(closest.ty - p.y) / (boxSizeY/10));
                if (err < 0.25) { mastery[lvl].p++; feedback += "<div class='fb-box' style='border-left-color:green'>Perfect match</div>"; }
                else if (err <= 0.6) { mastery[lvl].h++; feedback += "<div class='fb-box' style='border-left-color:orange'>Off by ½ square</div>"; }
                else { mastery[lvl].b++; currentB++; feedback += "<div class='fb-box' style='border-left-color:red'>Inaccurate</div>"; }
            }
        });

        // --- SAVE TO WRAPPER DASHBOARD ---
        // A pass requires all 5 points to be plotted with zero "Inaccurate" (> 0.6 square) errors
        let isPass = (currentB === 0); 
        const moduleId = "5"; 
        let modData = JSON.parse(localStorage.getItem(`gs_mod_${moduleId}`)) || { correct: 0, total: 0, details: {} };
        modData.total += 1;
        if (isPass) modData.correct += 1;
        modData.details = mastery; 
        localStorage.setItem(`gs_mod_${moduleId}`, JSON.stringify(modData));
        // ---------------------------------

        document.getElementById('feedback-text').innerHTML = feedback;
        document.getElementById('submit-btn').style.display = "none";
        document.getElementById('next-btn').style.display = "block";
        updateDashboard(); renderPlot();
    }

    function updateDashboard() {
        let html = "";
        for (let l=1; l<=4; l++) {
            let m = mastery[l], total = m.p + m.h + m.b;
            const pct = (v) => total ? Math.round(v/total*100) + "%" : "-";
            html += `<tr><td>Level ${l}</td><td style='color:green'>${m.p} (${pct(m.p)})</td><td style='color:orange'>${m.h} (${pct(m.h)})</td><td style='color:red'>${m.b} (${pct(m.b)})</td></tr>`;
        }
        document.getElementById('score-body').innerHTML = html;
    }

    function loadNewQuestion() {
        activeQuestion = generateData();
        document.getElementById('question-text').innerText = activeQuestion.scenario;
        let tbl = "<table class='data-table'><tr><th class='row-header'>"+activeQuestion.x.label.replace(' (x 10⁻² m)', ' (mm)')+"</th>";
        activeQuestion.dataX.forEach(d => tbl += "<td>"+d+"</td>");
        tbl += "</tr><tr><th class='row-header'>"+activeQuestion.y.label+"</th>";
        activeQuestion.dataY.forEach(d => tbl += "<td>"+d+"</td>");
        document.getElementById('table-container').innerHTML = tbl + "</tr></table>";
        document.getElementById('feedback-text').innerHTML = "";
        document.getElementById('submit-btn').style.display = "block";
        document.getElementById('next-btn').style.display = "none";
        userPoints = []; isEvaluating = false; drawBackground(activeQuestion); renderPlot();
    }

    plotCanvas.addEventListener('mousemove', e => {
        if (isEvaluating) return;
        const rect = plotCanvas.getBoundingClientRect();
        let rx = e.clientX - rect.left, ry = e.clientY - rect.top;
        if (rx > padL-5 && rx < 620-padR+5 && ry > padT-5 && ry < 620-padB+5) {
            inBounds = true;
            let mX = boxSizeX/10, mY = boxSizeY/10;
            snapY = (620-padB) - Math.round(((620-padB)-ry)/mY*2)/2 * mY;
            if (activeQuestion.type == "continuous") snapX = padL + Math.round((rx-padL)/mX*2)/2 * mX;
            else { hoverColIndex = Math.min(Math.max(Math.floor((rx - padL)/boxSizeX), 0), 4); snapX = padL + hoverColIndex*boxSizeX + boxSizeX/2; }
        } else inBounds = false;
        renderPlot();
    });

    plotCanvas.addEventListener('mousedown', () => {
        if (!inBounds || isEvaluating || userPoints.length >= 5) return;
        if (activeQuestion.type == "categorical") {
            let idx = userPoints.findIndex(p => p.col === hoverColIndex);
            if (idx > -1) userPoints.splice(idx, 1);
            userPoints.push({ x: snapX, y: snapY, col: hoverColIndex });
        } else userPoints.push({ x: snapX, y: snapY });
        renderPlot();
    });

    function undoLastPoint() { if(!isEvaluating) { userPoints.pop(); renderPlot(); } }
    function clearAllPoints() { if(!isEvaluating) { userPoints = []; renderPlot(); } }
    
    window.onload = () => { updateDashboard(); loadNewQuestion(); };
</script>
</body>
</html>
