<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback & Bug Reports - Graph Skills</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            max-width: 900px; 
            margin: 20px auto; 
            padding: 20px; 
            background-color: #f4f7f6; 
            color: #333; 
        }
        .module-container { 
            background: white; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            display: flex;
            flex-direction: column;
            min-height: 85vh;
        }
        h2 { margin-top: 0; color: #2c3e50; }
        p { color: #555; line-height: 1.5; }

        /* Tab Layout */
        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 15px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 15px 20px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 6px;
            background-color: #f8f9fa;
            color: #495057;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .tab-btn:hover { background-color: #e2e6ea; }
        
        /* Active States for Tabs */
        .tab-btn.active-bug {
            background-color: #fffafa;
            border-color: #d9534f;
            color: #d9534f;
        }
        .tab-btn.active-gen {
            background-color: #f0f8ff;
            border-color: #0056b3;
            color: #0056b3;
        }

        /* Iframe Container */
        .frame-wrapper {
            flex-grow: 1;
            width: 100%;
            border-radius: 6px;
            overflow: hidden;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
        }
        iframe {
            width: 100%;
            height: 100%;
            min-height: 800px;
            border: none;
        }

        .fallback-link {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9em;
        }
        .fallback-link a { color: #0056b3; text-decoration: none; }
        .fallback-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="module-container">
    <h2>We value your feedback!</h2>
    <p>Please select the type of feedback you would like to submit below. Your input helps us continuously improve these graph skills modules.</p>
    
    <div class="tab-container">
        <button id="btn-bug" class="tab-btn active-bug" onclick="switchForm('bug')">
            🐞 Report a Particular Issue / Bug
        </button>
        <button id="btn-gen" class="tab-btn" onclick="switchForm('gen')">
            💡 Leave General Feedback
        </button>
    </div>

    <div class="frame-wrapper">
        <iframe id="google-form" src="https://docs.google.com/forms/d/e/1FAIpQLSe-eWNrhR3skvDqKBRu4MxC9KEER77_bSZLOFY1PxN9J9Xicg/viewform?embedded=true" title="Feedback Form">
            Loading form...
        </iframe>
    </div>

    <div class="fallback-link">
        Having trouble viewing the form? 
        <a id="direct-link" href="https://docs.google.com/forms/d/e/1FAIpQLSe-eWNrhR3skvDqKBRu4MxC9KEER77_bSZLOFY1PxN9J9Xicg/viewform" target="_blank">
            Click here to open it in a new window.
        </a>
    </div>
</div>

<script>
    const urls = {
        bug: "https://docs.google.com/forms/d/e/1FAIpQLSe-eWNrhR3skvDqKBRu4MxC9KEER77_bSZLOFY1PxN9J9Xicg/viewform",
        gen: "https://docs.google.com/forms/d/e/1FAIpQLSfmuIBCO1ZB0IcOv-vAXq2nWOGTE-HRTBPGnT-KdTT2zdmN4A/viewform"
    };

    function switchForm(type) {
        const btnBug = document.getElementById('btn-bug');
        const btnGen = document.getElementById('btn-gen');
        const iframe = document.getElementById('google-form');
        const directLink = document.getElementById('direct-link');

        // Reset styling
        btnBug.className = "tab-btn";
        btnGen.className = "tab-btn";

        // Apply new styling and URLs
        if (type === 'bug') {
            btnBug.classList.add('active-bug');
            iframe.src = urls.bug + "?embedded=true";
            directLink.href = urls.bug;
        } else {
            btnGen.classList.add('active-gen');
            iframe.src = urls.gen + "?embedded=true";
            directLink.href = urls.gen;
        }
    }
</script>

</body>
</html>
