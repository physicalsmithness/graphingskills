<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback & Bug Reports - Graph Skills</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            max-width: 1400px; /* Widened to comfortably fit side-by-side forms */
            margin: 20px auto; 
            padding: 20px; 
            background-color: #f4f7f6; 
            color: #333; 
        }
        .module-container { 
            background: white; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            display: flex;
            flex-direction: column;
            min-height: 85vh;
        }
        h2 { 
            margin-top: 0; 
            color: #2c3e50; 
            border-bottom: 2px solid #eee; 
            padding-bottom: 15px;
        }
        
        /* Grid Layout */
        .forms-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 20px;
            flex-grow: 1;
        }

        /* Responsive fallback for smaller screens */
        @media (max-width: 900px) {
            .forms-grid {
                grid-template-columns: 1fr;
            }
        }

        .form-column {
            display: flex;
            flex-direction: column;
        }

        .form-header {
            font-size: 1.1em;
            font-weight: bold;
            color: #495057;
            margin-bottom: 15px;
            text-align: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 6px;
            border: 1px solid #dee2e6;
        }

        /* Iframe Container */
        .frame-wrapper {
            flex-grow: 1;
            width: 100%;
            border-radius: 6px;
            overflow: hidden;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
        }
        iframe {
            width: 100%;
            height: 100%;
            min-height: 800px;
            border: none;
        }

        .fallback-link {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9em;
        }
        .fallback-link a { color: #0056b3; text-decoration: none; }
        .fallback-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="module-container">
    <h2>Feedback & Issue Reporting</h2>
    
    <div class="forms-grid">
        <div class="form-column">
            <div class="form-header">💡 General Feedback</div>
            <div class="frame-wrapper">
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfmuIBCO1ZB0IcOv-vAXq2nWOGTE-HRTBPGnT-KdTT2zdmN4A/viewform?embedded=true" title="General Feedback Form">
                    Loading form...
                </iframe>
            </div>
            <div class="fallback-link">
                Having trouble viewing? <a href="https://docs.google.com/forms/d/e/1FAIpQLSfmuIBCO1ZB0IcOv-vAXq2nWOGTE-HRTBPGnT-KdTT2zdmN4A/viewform" target="_blank">Open General Feedback in a new window</a>.
            </div>
        </div>

        <div class="form-column">
            <div class="form-header">🐞 Report a Particular Issue</div>
            <div class="frame-wrapper">
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSe-eWNrhR3skvDqKBRu4MxC9KEER77_bSZLOFY1PxN9J9Xicg/viewform?embedded=true" title="Issue Report Form">
                    Loading form...
                </iframe>
            </div>
            <div class="fallback-link">
                Having trouble viewing? <a href="https://docs.google.com/forms/d/e/1FAIpQLSe-eWNrhR3skvDqKBRu4MxC9KEER77_bSZLOFY1PxN9J9Xicg/viewform" target="_blank">Open Issue Report in a new window</a>.
            </div>
        </div>
    </div>
</div>

</body>
</html>
