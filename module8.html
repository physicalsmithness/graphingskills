<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Graph Skills - Module 8</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1200px; margin: 20px auto; padding: 20px; background-color: #f4f7f6; color: #333; }
        .module-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .app-layout { display: grid; grid-template-columns: 620px auto; gap: 30px; margin-top: 15px; }
        .graph-wrapper { position: relative; width: 620px; height: 620px; background: #fff; border: 1px solid #ccc; cursor: crosshair;}
        canvas { display: block; position: absolute; top: 0; left: 0; } #bgCanvas { z-index: 1; } #drawCanvas { z-index: 2; }
        .info-panel { background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
        .scenario-box { padding: 15px; background: #eef2f5; border-radius: 6px; border-left: 4px solid #0056b3; margin-bottom: 20px; font-size: 1.05em; line-height: 1.4;}
        .step-box { padding: 15px; background: #fff; border-radius: 6px; border: 1px solid #ccc; margin-bottom: 15px;}
        input[type="number"], input[type="text"] { padding: 8px; font-size: 1em; width: 80px; border: 1px solid #ccc; border-radius: 4px;}
        .coord-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;}
        .btn-main { display: block; padding: 12px; font-size: 1.1em; cursor: pointer; border: none; border-radius: 4px; background-color: #0056b3; color: white; width: 100%; margin-top: 10px; font-weight: bold;}
        .btn-main:hover { background-color: #004494; } .btn-main:disabled { opacity: 0.6; cursor: not-allowed; }
        .split-fb { padding: 12px; border-radius: 4px; font-size: 0.9em; line-height: 1.4; border-left: 5px solid; background: #fff; margin-top: 10px;}
        .pass-box { border-color: #28a745; color: #155724; } .err-box { border-color: #d9534f; color: #721c24; } .meh-box { border-color: #ffc107; color: #856404; }
    </style>
</head>
<body>
<div class="module-container">
    <h2 style="margin-top:0;">Module 8: Calculating Gradients</h2>
    <div class="app-layout">
        <div class="graph-wrapper"><canvas id="bgCanvas" width="620" height="620"></canvas><canvas id="drawCanvas" width="620" height="620"></canvas></div>
        <div class="info-panel">
            <div class="scenario-box" id="scenario-text">Loading...</div>
            <div class="step-box"><strong>Step 1: Point Selection</strong><br><small>Click TWO points ON THE LINE to build your triangle.</small></div>
            <div class="step-box">
                <strong>Step 2: Read Coordinates</strong>
                <div class="coord-inputs">
                    <div>P1 X: <input type="number" id="p1x"></div><div>P1 Y: <input type="number" id="p1y"></div>
                    <div>P2 X: <input type="number" id="p2x"></div><div>P2 Y: <input type="number" id="p2y"></div>
                </div>
            </div>
            <div class="step-box">
                <strong>Step 3: Calculate Gradient</strong><br><small>Rate of Change = ΔY / ΔX</small>
                <div style="margin-top:10px;">Value: <input type="number" id="grad-val" step="any" style="width:120px;"> Unit: <input type="text" id="grad-unit" placeholder="e.g. m/s"></div>
            </div>
            <button class="btn-main" id="eval-btn" onclick="evaluateGradient()">Evaluate Calculation</button>
            <button class="btn-main" id="next-btn" style="background:#28a745; display:none;" onclick="init()">Next Practice Scenario</button>
            <div id="feedback"></div>
        </div>
    </div>
</div>

<script>
    const scenarioBank = [
        { id: 801, t: "Velocity-Time Graph (Acceleration)", xL: "Time (s)", yL: "Velocity (m/s)", u: "m/s²", minX: 0, maxX: 10, minY: 0, maxY: 50 },
        { id: 802, t: "Hooke's Law (Spring Constant)", xL: "Extension (m)", yL: "Force (N)", u: "N/m", minX: 0, maxX: 0.5, minY: 0, maxY: 10 },
        { id: 803, t: "Ohm's Law (Resistance)", xL: "Current (A)", yL: "Voltage (V)", u: "Ω", minX: 0, maxX: 5, minY: 0, maxY: 20 }
    ];

    const bgCanvas = document.getElementById('bgCanvas'), ctxBg = bgCanvas.getContext('2d'), drawCanvas = document.getElementById('drawCanvas'), ctxDraw = drawCanvas.getContext('2d'), pad = 60, size = 500;
    let points = [], lineM = 0, lineC = 0, userPts = [], activeScen = null;
    
    const MODULE_ID = "8"; let stats = { sel: { line: 0, raw: 0, flt: 0 }, rd: { perf: 0, min: 0, sxy: 0, sp12: 0, off: 0 }, tri: { ok: 0, sml: 0 }, math: { perf: 0, rnd: 0, inv: 0, p10: 0, oth: 0 }, unit: { cor: 0, err: 0 } }; let totalPasses = 0, totalAttempts = 0;
    try { let mem = JSON.parse(localStorage.getItem(`gs_mod_${MODULE_ID}`)); if(mem && mem.details) { totalPasses = mem.correct || 0; totalAttempts = mem.total || 0; stats = mem.details; } } catch(e){}

    function init() {
        points = []; userPts = []; ['p1x','p1y','p2x','p2y','grad-val','grad-unit'].forEach(id => document.getElementById(id).value = "");
        document.getElementById('feedback').innerHTML = ""; document.getElementById('next-btn').style.display = "none"; document.getElementById('eval-btn').style.display = "block";
        
        activeScen = scenarioBank[Math.floor(Math.random() * scenarioBank.length)];
        document.getElementById('scenario-text').innerHTML = `<strong>${activeScen.t}</strong><br>Calculate the gradient of the line of best fit.`;
        
        lineM = (activeScen.maxY - activeScen.minY) / (activeScen.maxX - activeScen.minX) * (0.8 + Math.random()*0.4);
        lineC = activeScen.minY + (Math.random() * 0.1 * (activeScen.maxY - activeScen.minY));
        
        let spanX = activeScen.maxX - activeScen.minX;
        for (let i=1; i<=6; i++) {
            let px = activeScen.minX + (i/7)*spanX + (Math.random()*0.05*spanX);
            let py = lineM*px + lineC + ((Math.random()*0.15 - 0.075)*(activeScen.maxY - activeScen.minY));
            points.push({ dx: px, dy: py, px: pad + ((px - activeScen.minX)/spanX)*size, py: pad + size - ((py - activeScen.minY)/(activeScen.maxY - activeScen.minY))*size });
        }
        drawGrid();
    }

    function drawGrid() {
        ctxBg.clearRect(0,0,620,620); ctxDraw.clearRect(0,0,620,620); ctxBg.strokeStyle = "#eee"; ctxBg.lineWidth = 1;
        for(let i=0; i<=10; i++) { let p = pad + (i*(size/10)); ctxBg.beginPath(); ctxBg.moveTo(p, pad); ctxBg.lineTo(p, pad+size); ctxBg.stroke(); ctxBg.beginPath(); ctxBg.moveTo(pad, p); ctxBg.lineTo(pad+size, p); ctxBg.stroke(); }
        ctxBg.lineWidth = 2; ctxBg.strokeStyle = "#000"; ctxBg.strokeRect(pad, pad, size, size);
        ctxBg.fillStyle = "#000"; ctxBg.font = "bold 14px Arial"; ctxBg.textAlign = "center"; ctxBg.fillText(activeScen.xL, pad+(size/2), pad+size+40); ctxBg.save(); ctxBg.translate(20, pad+(size/2)); ctxBg.rotate(-Math.PI/2); ctxBg.fillText(activeScen.yL, 0, 0); ctxBg.restore();
        
        // Draw Best Fit Line
        ctxBg.strokeStyle = "#0056b3"; ctxBg.lineWidth = 3; ctxBg.beginPath();
        let py0 = pad + size - ((lineC - activeScen.minY)/(activeScen.maxY - activeScen.minY))*size; ctxBg.moveTo(pad, py0);
        let pyMax = pad + size - (((lineM*activeScen.maxX + lineC) - activeScen.minY)/(activeScen.maxY - activeScen.minY))*size; ctxBg.lineTo(pad+size, pyMax); ctxBg.stroke();
        
        points.forEach(p => { ctxBg.strokeStyle = "#c0392b"; ctxBg.lineWidth = 2; ctxBg.beginPath(); ctxBg.moveTo(p.px-5, p.py-5); ctxBg.lineTo(p.px+5, p.py+5); ctxBg.moveTo(p.px+5, p.py-5); ctxBg.lineTo(p.px-5, p.py+5); ctxBg.stroke(); });
    }

    drawCanvas.addEventListener('mousedown', e => {
        if(userPts.length >= 2) return;
        let r = drawCanvas.getBoundingClientRect(), mx = e.clientX - r.left, my = e.clientY - r.top;
        if(mx >= pad && mx <= pad+size && my >= pad && my <= pad+size) {
            userPts.push({ x: mx, y: my });
            ctxDraw.fillStyle = "#e67e22"; ctxDraw.beginPath(); ctxDraw.arc(mx, my, 6, 0, 7); ctxDraw.fill();
            if(userPts.length === 2) {
                ctxDraw.strokeStyle = "#e67e22"; ctxDraw.setLineDash([5,5]); ctxDraw.beginPath(); ctxDraw.moveTo(userPts[0].x, userPts[0].y); ctxDraw.lineTo(userPts[1].x, userPts[0].y); ctxDraw.lineTo(userPts[1].x, userPts[1].y); ctxDraw.stroke(); ctxDraw.setLineDash([]);
            }
        }
    });

    function evaluateGradient() {
        if(userPts.length < 2) return alert("Select two points on the line first.");
        let p1x = parseFloat(document.getElementById('p1x').value), p1y = parseFloat(document.getElementById('p1y').value);
        let p2x = parseFloat(document.getElementById('p2x').value), p2y = parseFloat(document.getElementById('p2y').value);
        let gV = parseFloat(document.getElementById('grad-val').value), gU = document.getElementById('grad-unit').value.trim();
        if(isNaN(p1x)||isNaN(p1y)||isNaN(p2x)||isNaN(p2y)||isNaN(gV)) return alert("Fill in all numerical fields.");

        let isPass = true; let fH = ""; let errLog = [];

        // 1. Selection & Reading (simplified for brevity)
        let trueDX1 = activeScen.minX + ((userPts[0].x - pad)/size)*(activeScen.maxX - activeScen.minX);
        let trueDY1 = activeScen.minY + ((pad + size - userPts[0].y)/size)*(activeScen.maxY - activeScen.minY);
        let tolX = (activeScen.maxX - activeScen.minX)/50, tolY = (activeScen.maxY - activeScen.minY)/50;
        
        let readErr = Math.abs(p1x - trueDX1) + Math.abs(p1y - trueDY1); // crude read check
        if(readErr <= tolX*2) { stats.rd.perf++; fH += `<div class="split-fb pass-box">✅ Read: Good coordinate extraction.</div>`; }
        else { stats.rd.off++; isPass = false; fH += `<div class="split-fb err-box">❌ Read: Coordinates misread from grid.</div>`; errLog.push("Misread Grid"); }

        // 2. Triangle Size
        let triDist = Math.abs(userPts[1].x - userPts[0].x);
        if(triDist > size*0.4) { stats.tri.ok++; fH += `<div class="split-fb pass-box">✅ Triangle: Nice large triangle used.</div>`; }
        else { stats.tri.sml++; isPass = false; fH += `<div class="split-fb err-box">❌ Triangle: Too small! Points must be far apart.</div>`; errLog.push("Triangle too small"); }

        // 3. Math
        let expectedGrad = (p2y - p1y) / (p2x - p1x);
        let mErr = Math.abs(gV - expectedGrad);
        if(mErr < 0.05) { stats.math.perf++; fH += `<div class="split-fb pass-box">✅ Math: Calculation is correct.</div>`; }
        else { stats.math.oth++; isPass = false; fH += `<div class="split-fb err-box">❌ Math: Calculation error. Expected ${expectedGrad.toFixed(2)}.</div>`; errLog.push("Math error"); }

        // 4. Units
        if(gU.toLowerCase() === activeScen.u.toLowerCase() || gU === activeScen.u.replace('²','2')) { stats.unit.cor++; fH += `<div class="split-fb pass-box">✅ Unit: Correct physics unit.</div>`; }
        else { stats.unit.err++; isPass = false; fH += `<div class="split-fb err-box">❌ Unit: Incorrect. Should be ${activeScen.u}.</div>`; errLog.push("Wrong unit"); }

        document.getElementById('feedback').innerHTML = fH; document.getElementById('eval-btn').style.display = "none"; document.getElementById('next-btn').style.display = "block";
        totalAttempts++; if(isPass) totalPasses++;
        
        // --- TRACKING CODE ---
        let statusText = isPass ? "Pass" : "Fail";
        let errorString = errLog.length > 0 ? errLog.join(" | ") : "None";
        if (window.parent && window.parent.logToTeacher) { window.parent.logToTeacher("Module 8", activeScen.id, activeScen.t, statusText, errorString); }
        // ---------------------

        localStorage.setItem(`gs_mod_${MODULE_ID}`, JSON.stringify({ correct: totalPasses, total: totalAttempts, details: stats }));
    }
    init();
</script>
</body>
</html>
